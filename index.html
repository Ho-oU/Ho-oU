<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookbook Recipes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header with title and support button -->
    <header>
        <h1>Cookbook Recipes</h1>
        <button id="supportBtn" class="support-button">Support Us ☰</button>
    </header>

    <!-- Main content: category grid -->
    <main>
        <div id="category-grid" class="category-grid"></div>
    </main>

    <!-- The sliding panel (hidden by default) -->
    <div id="supportPanel" class="support-panel">
        <button id="closePanel" class="close-btn">✖</button>
        <ul class="support-list">
            <li>Contact Us</li>
            <li>★ Rate Us</li>
            <li>▼ Share App</li>
            <li>● More Apps</li>
            <li>★ Privacy Policy</li>
            <li>Exit</li>
        </ul>
    </div>

    <!-- Overlay (dark background when panel is open) -->
    <div id="overlay" class="overlay"></div>

    <script src="script.js"></script>
</body>
</html>
